# FastAPI — production read-only diagnostic policy.
#
# The "agent as on-call assistant" stance: it can read logs, fetch
# observability data, look at code. It cannot mutate anything,
# anywhere. Selecting this policy is the operator's deliberate signal
# that the agent is touching prod-adjacent state and the answer is
# "look but don't touch".

inherits = "secure-defaults"
name = "fastapi_prod_readonly"
description = "Diagnose prod; cannot mutate anything."

[filesystem]
read_allow = ["src/**", "app/**", "**/*.md", "/var/log/myapp/**"]

[network]
http_get_allow = [
    "api.github.com",
    "datadoghq.com", "*.datadoghq.com",
    "sentry.io", "*.sentry.io",
    "api.example.com",
]

[environment]
allow_vars = ["USER", "PATH", "FASTAPI_ENV", "DATADOG_API_KEY", "SENTRY_DSN"]

[subprocess]
# Read-only diagnostic shell only.
allow_commands = [
    "git",
    "cat", "head", "tail", "less", "grep", "wc", "find",
    "ls", "ps", "df", "du",
]

[subprocess.deny_args]
git = ["push", "commit", "merge", "rebase", "reset --hard", "clean"]

[functions]
allow = [
    "fs.read",
    "net.http_get",
    "subprocess.exec",
    "env.read",
]
