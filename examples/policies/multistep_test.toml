# Multi-step test fixture policy.
#
# More permissive than dev.toml — adds the read-only Unix utilities a
# realistic developer agent reaches for (cat, head, tail, wc, grep,
# find, sort, uniq, date, uname, du, df, diff). Inherits secure-defaults
# so all the universal denies (~/.aws, ~/.ssh, **/.env, AWS_*,
# OPENAI_API_KEY, cloud metadata, RFC1918, etc.) still apply.
#
# This policy is the harness fixture for examples/local_executor/run_multistep.py.

inherits = "secure-defaults"
name = "multistep_test"
description = "Permissive policy for the multistep evaluation harness."

[filesystem]
read_allow = [
    "/tmp/denyx_demo/**",
    "/etc/hostname",
    "/etc/os-release",
    "examples/**",
]
# Tagged for the LOCAL_ONLY_fs_redaction task — the script may read
# files in fixtures/secrets/ but the value is tainted at the output
# boundary (the runtime substring-redacts it before printed lines,
# audit payloads, or MCP tool results cross back to the caller).
local_only_read = ["/tmp/denyx_demo/multistep/fixtures/secrets/**"]
write_allow = ["/tmp/denyx_demo/**"]
delete_allow = ["/tmp/denyx_demo/**"]

[network]
http_get_allow = [
    "api.github.com",
    "raw.githubusercontent.com",
]

[environment]
allow_vars = ["USER", "HOME", "PATH", "LANG", "PWD", "SHELL", "TERM"]
# Tagged for the LOCAL_ONLY_env_redaction task — the script may
# `env.read("DENYX_DEMO_SECRET")` and use the value, but the value
# is tainted at the output boundary.
local_only_vars = ["DENYX_DEMO_SECRET"]

[subprocess]
allow_commands = [
    "git", "echo",
    "cat", "ls", "head", "tail", "wc",
    "grep", "find", "sort", "uniq",
    "date", "hostname", "uname",
    "du", "df", "diff",
]

[subprocess.deny_args]
git = ["push --force", "push -f", "reset --hard", "clean -fd"]

# Capabilities are auto-derived from the populated resource sections.
