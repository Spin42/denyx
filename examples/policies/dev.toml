# Aegis dev policy. The format is portable across agentic systems —
# see docs/AGENT_POLICY_SPEC.md. The Aegis runtime enforces the
# filesystem, network, environment, subprocess, and functions sections
# directly; database/deployment sections (if present) are read by host
# integrations that handle those surfaces.
#
# Path patterns are gitignore-style: relative patterns match anywhere
# under the policy root, absolute patterns match literal absolute paths,
# `~/...` expands to $HOME.

# Top-level: which capabilities prompt the human before firing.
# (Must come before any [section] to be parsed at the root.)
confirm_per_call = [
    "fs.write",
    "fs.delete",
    "subprocess.exec",
]

[filesystem]
read_allow = [
    "/tmp/aegis_demo/**",
    "examples/**",
    "/etc/hostname",
]
write_allow = [
    "/tmp/aegis_demo/**",
]
delete_allow = [
    "/tmp/aegis_demo/**",
]
# Deny wins over allow. Belt-and-suspenders against symlink/typo bugs.
deny = [
    "~/.aws/**",
    "~/.ssh/**",
    "~/.config/**",
    ".env",
    "**/secrets/**",
    "/etc/passwd",
    "/etc/shadow",
]

[network]
http_get_allow = [
    "api.github.com",
    "*.npmjs.org",
]
http_post_allow = []
deny_hosts = [
    "evil-exfil.example.com",
]
deny_ips = [
    "169.254.169.254",  # cloud metadata service
]

[environment]
# Read named env vars only. Default deny.
allow_vars = [
    "USER",
    "HOME",
    "PATH",
    "GITHUB_REPOSITORY",
]
deny_vars = [
    "AWS_ACCESS_KEY_ID",
    "AWS_SECRET_ACCESS_KEY",
    "OPENAI_API_KEY",
    "ANTHROPIC_API_KEY",
]

[subprocess]
# Per-command allowlist. Matches argv[0] basename. Empty = no commands.
allow_commands = [
    "git",
    "echo",
]
deny_commands = [
    "rm",
    "dd",
    "mkfs",
    "shred",
    "curl",
    "wget",
    "ssh",
    "nc",
    "sudo",
]

[functions]
# Capabilities the script may call. Names are the dotted form
# (`fs.read`, `net.http_get`, etc.); the verifier rejects pre-execution
# if a script references a capability not in this list.
allow = [
    "fs.read",
    "fs.write",
    "fs.delete",
    "net.http_get",
    "subprocess.exec",
    "env.read",
]
deny = []
