# cargo-mutants configuration for Denyx.
#
# Mutation testing measures whether the test suite *actually verifies*
# the behaviour of each line, not just whether the line was executed.
# For most code that's redundant with line coverage; for security gates
# it's load-bearing — a flipped operator inside `Policy::check_fs_read`
# is the kind of one-character change the tests must catch and the
# reason this tool is wired in at all.
#
# Scope is intentionally narrow. Mutating the whole workspace would
# generate ~1000+ mutants, take many hours, and produce mostly
# uninteresting noise from dispatch glue and CLI arg-parsing. The
# files listed here are the ones where a wrong operator equals a
# real security bug:
#
#   - crates/policy/src/lib.rs    — the policy gate (~207 mutants)
#   - crates/host/src/taint.rs    — the IFC layer  (~137 mutants)
#   - crates/host/src/verifier.rs — the capability scanner (~112 mutants)
#
# Total: ~450 mutants. With -j 4 on a typical laptop, roughly a
# 30-60 minute run.

# Only mutate the security-critical files. cargo-mutants applies
# globs to source paths.
examine_globs = [
    "crates/policy/src/lib.rs",
    "crates/host/src/taint.rs",
    "crates/host/src/verifier.rs",
]

# Pad the auto-detected per-mutant test timeout. cargo-mutants
# measures the unmutated test suite's run time and multiplies by
# this. 5x is generous enough to absorb mutants that incidentally
# run a few tests slower without producing false-positive timeouts.
timeout_multiplier = 5.0

# Lower bound on the per-mutant timeout (seconds). Without this the
# tool can pick a tiny base time on a warm machine and start
# false-positive timing out perfectly fine mutants on a busier CI
# runner.
minimum_test_timeout = 30.0

# Exclude known-equivalent mutants — code edits that are syntactically
# different but semantically identical. The triage discipline is:
# every entry here MUST have a comment explaining why it's
# equivalent. If you can't write the explanation, it's not equivalent
# and you should add a test instead.
exclude_re = [
    # NOTE on regex format: cargo-mutants reports mutant names as
    # `<file>:<line>:<col>: <description>`, where `<description>`
    # is the form `replace X with Y in <function>` — i.e. the
    # function name comes AFTER the operator change. Patterns below
    # match against this full string; substring order matters.

    # b64_encode combines bytes via bitwise OR after shifting them
    # to non-overlapping positions (0-7, 8-15, 16-23). For non-
    # overlapping bit ranges, `|` and `^` produce identical results.
    # No security difference; mutation passes any test that exercises
    # b64 encoding correctness.
    "taint\\.rs:.*replace \\| with \\^ in b64_encode",

    # ROT-N math coincidence. Inside the alphabetic branch, the
    # original `b - 'A' + n` and the mutant `b + 'A' + n` are
    # equivalent modulo 26 because 'A' = 65 ≡ 13 (mod 26), and the
    # subtraction and addition of any value congruent-to-13 collapse
    # to the same result under `% 26`. The same coincidence applies
    # to 'a' = 97 ≡ 19 (mod 26) — `(b - 'a' + n) % 26 == (b + 'a' + n) % 26`
    # holds. See the docstring on `compute_transforms`.
    "taint\\.rs:24[12]:.*replace - with \\+ in compute_transforms",
    "taint\\.rs:24[12]:.*replace - with / in compute_transforms",

    # `looks_like_path_arg` chained `||` (lines 1574-1576): the
    # path-prefix detection chain is
    #   arg.starts_with('/')
    #     || arg.starts_with("./")
    #     || arg.starts_with("../")
    #     || arg.starts_with("~/")
    #     || arg == "~"
    # Mutating any `||` between two `starts_with` calls to `&&`
    # short-circuits that chain to false (a string can't start with
    # two different prefixes simultaneously). The function then
    # falls through to `if arg.contains('/') { return true; }`,
    # which catches the same paths (anything with `/` returns true
    # there). The only case that's NOT caught by the contains('/')
    # fallthrough is `arg == "~"` — and that case is killed by
    # `looks_like_path_arg_treats_three_elements_with_path` in
    # gate_decisions.rs (which targets the `||` between "~/" and
    # "~"). The other three `||` mutations are observably
    # equivalent.
    "lib\\.rs:157[456]:.*replace \\|\\| with && in looks_like_path_arg",

    # `redact_lines` line-spans assignment: `if m >= *start && m
    # < *end`. The `< with <=` mutant changes whether a match
    # landing EXACTLY at *end (the joining '\n' byte position) is
    # assigned to the previous line. This is unreachable in
    # practice because:
    #   1. For a match to land at *end, the secret must contain a
    #      '\n' (since haystack[*end] == '\n' and subsequence_match
    #      requires needle[i] == haystack[matches[i]]).
    #   2. TaintRegistry::add() trims leading/trailing whitespace
    #      from secrets, so any '\n' must be in the secret's
    #      middle.
    #   3. For a middle '\n' to align with a haystack line
    #      boundary, the secret chars before/after the '\n' must
    #      align with haystack chars before/after that boundary.
    #   4. By construction, every haystack char before the boundary
    #      that's matched by the secret falls into the previous
    #      line's span — meaning the line is already clobbered by
    #      those matches alone, regardless of what happens at the
    #      boundary itself.
    # The mutant therefore changes WHICH match (also) clobbers an
    # already-clobbered line. Output is byte-identical.
    "taint\\.rs:489:.*replace < with <= in redact_lines",

    # `strip_strings_and_comments` escape-bounds check at line 103:
    # `if bytes[i] == b'\\' && i + 1 < bytes.len() { i += 2 } else
    # { i += 1 }`. The bounds check is a guard against `i += 2`
    # walking off the end of the buffer when bytes[i]='\\' is the
    # LAST byte. Three mutations at this position are observably
    # equivalent:
    #
    #   - 103:47 `+ → -`: `i - 1 < len`. For all i >= 1 (we're
    #     past the opener), `i - 1` is in-range and `i - 1 < len`
    #     is always true.
    #   - 103:47 `+ → *`: `i * 1 < len` = `i < len`, also always
    #     true inside this loop (the outer while gates on i < len).
    #   - 103:51 `< → <=`: `i + 1 <= len`, true when i + 1 == len.
    #
    # In all three cases the mutant takes the escape branch (i += 2)
    # WHERE THE ORIGINAL took the else branch (i += 1) — but ONLY
    # at the very last byte of the buffer, where the WHILE loop is
    # about to exit anyway. Specifically the divergence is:
    #
    #   bytes[i] == '\\', i == len - 1
    #   → original: i = len. Mutant: i = len + 1 (or larger).
    #
    # Both i values make the post-loop check `i < len && bytes[i]
    # == q` false (the first conjunct fails), so neither path
    # consumes a closer byte. Both then `out.push(b' ')`. The outer
    # while at the top gates on `i < len` — both i values fail that
    # condition. Output is byte-identical.
    "verifier\\.rs:103:.*replace \\+ with [-*] in strip_strings_and_comments",
    "verifier\\.rs:103:.*replace < with <= in strip_strings_and_comments",

    # *::as_str helpers (SandboxMode::as_str, FsAction::as_str,
    # HttpVerb::as_str) only feed into error-message rendering. The
    # mutator generates `""` and `"xyzzy"` variants that survive
    # because no test asserts the exact string used in a denial
    # message — and asserting on those strings would be brittle
    # (any rephrasing of the error message would break tests). The
    # cosmetic effect of returning the wrong as_str value is "the
    # error message names the wrong action," not a security
    # regression.
    #
    # Format note: this is an FnValue mutator (not BinaryOp), so
    # the mutant name has function-then-return-then-value order:
    # `replace <fn>::as_str -> &'static str with "<value>"`.
    "lib\\.rs:.*::as_str -> &'static str with \"",
]
