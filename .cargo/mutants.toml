# cargo-mutants configuration for Denyx.
#
# Mutation testing measures whether the test suite *actually verifies*
# the behaviour of each line, not just whether the line was executed.
# For most code that's redundant with line coverage; for security gates
# it's load-bearing — a flipped operator inside `Policy::check_fs_read`
# is the kind of one-character change the tests must catch and the
# reason this tool is wired in at all.
#
# Scope is intentionally narrow. Mutating the whole workspace would
# generate ~1000+ mutants, take many hours, and produce mostly
# uninteresting noise from dispatch glue and CLI arg-parsing. The
# files listed here are the ones where a wrong operator equals a
# real security bug:
#
#   - crates/policy/src/lib.rs    — the policy gate (~207 mutants)
#   - crates/host/src/taint.rs    — the IFC layer  (~137 mutants)
#   - crates/host/src/verifier.rs — the capability scanner (~112 mutants)
#
# Total: ~450 mutants. With -j 4 on a typical laptop, roughly a
# 30-60 minute run.

# Only mutate the security-critical files. cargo-mutants applies
# globs to source paths.
examine_globs = [
    "crates/policy/src/lib.rs",
    "crates/host/src/taint.rs",
    "crates/host/src/verifier.rs",
]

# Pad the auto-detected per-mutant test timeout. cargo-mutants
# measures the unmutated test suite's run time and multiplies by
# this. 2.5x is enough to absorb mutants that incidentally run a
# few tests slower without producing false-positive timeouts, while
# keeping the cost of any genuinely-infinite-loop mutant we haven't
# pre-excluded under control. Was 5x; dropped after a sharded CI
# run showed legitimate-looking timeouts dominated shard wallclock
# (each one paid the full 5x ≈ 125s). 2.5x ≈ 60s is plenty: the
# slowest legitimate mutant in the monitored files runs well under
# 30s, baseline test is ~25s.
timeout_multiplier = 2.5

# Lower bound on the per-mutant timeout (seconds). Without this the
# tool can pick a tiny base time on a warm machine and start
# false-positive timing out perfectly fine mutants on a busier CI
# runner.
minimum_test_timeout = 30.0

# Exclude known-equivalent mutants — code edits that are syntactically
# different but semantically identical. The triage discipline is:
# every entry here MUST have a comment explaining why it's
# equivalent. If you can't write the explanation, it's not equivalent
# and you should add a test instead.
#
# MAINTENANCE WARNING: several entries below are anchored to an exact
# `file:line` position (cargo-mutants mutant names are
# `file:line:col: replace X with Y in fn`). These line numbers drift
# silently whenever code is added/removed above them in the same
# file — a stale anchor doesn't wrongly suppress a different mutant
# (the function name in the pattern won't coincidentally match at the
# wrong line), it just stops matching anything, so the "equivalent"
# mutant it used to cover reappears as a new "missed" mutant in the
# next report. This has already happened once (verifier.rs nearly
# tripled in size from the T6 static taint-propagation pass and every
# line anchor below went stale). If you edit crates/policy/src/lib.rs,
# crates/host/src/taint.rs, or crates/host/src/verifier.rs, re-verify
# every line-anchored pattern below (and the matching in-code comments
# in each file's own test module) still points at the right code —
# see CLAUDE.md's "Maintenance duties" section.
exclude_re = [
    # NOTE on regex format: cargo-mutants reports mutant names as
    # `<file>:<line>:<col>: <description>`, where `<description>`
    # is the form `replace X with Y in <function>` — i.e. the
    # function name comes AFTER the operator change. Patterns below
    # match against this full string; substring order matters.

    # ─── Loop-counter `+=` mutations ───────────────────────────────
    #
    # Every `+=` operator in the three monitored files is a `usize`
    # loop counter walking forward through a buffer. Mutating the
    # increment to `*=` keeps the counter at 0 (since the most-
    # common entry value is 0 and 0 * n = 0); mutating to `-=`
    # either oscillates with adjacent paths that increment by 2
    # (the escape-handling branch in `strip_strings_and_comments`,
    # for instance) or underflows in release-mode wraparound.
    # Either way the function never terminates.
    #
    # cargo-mutants classifies these as TIMEOUT, which is a valid
    # "tests didn't catch this" signal — but since the only way to
    # catch them is *by* a timeout (no assertion can detect a hang
    # while still being meaningful), they each cost the full
    # `timeout_multiplier × baseline` of CI wallclock for zero new
    # information. The function structure (`while i < bytes.len()`
    # plus a forward-walking counter) is what guarantees
    # termination; the type system and the loop guard together
    # make these mutants uninteresting.
    #
    # If you add a non-counter `+=` (an accumulator, a stat
    # tracker, a length tally) to any of these files later, you
    # must NARROW these patterns to the specific counter functions
    # so the new accumulator's `+=` is not silently ignored. Today
    # all `+=` operators in scope are counters; verified with
    # `grep -n '+=' crates/host/src/{verifier,taint}.rs` returning
    # only loop-counter call sites.
    #
    # `extract_literal_args` (verifier.rs's taint_flow submodule) is
    # the same shape (a `while i + needle.len() <= bytes.len()`
    # forward scan, plus an inner `j` scan for the quoted-string
    # body) and was missing from this function-name list — a live
    # CI run timed out on two of its `+=` mutants (`j += 1` at the
    # string-body scan, `i += 1` at the outer scan) before this was
    # added. When you add a NEW byte-scanning helper with a `while
    # <counter> < bytes.len()`-shaped loop to any of the three
    # monitored files, check whether it needs adding here too —
    # don't assume this list is exhaustive just because it compiles.
    "verifier\\.rs:.*replace \\+= with \\*= in (contains_word|strip_strings_and_comments|taint_flow::extract_literal_args)",
    "verifier\\.rs:.*replace \\+= with -= in (contains_word|strip_strings_and_comments|taint_flow::extract_literal_args)",
    "taint\\.rs:.*replace \\+= with \\*= in b64_encode",
    "taint\\.rs:.*replace \\+= with -= in b64_encode",

    # `extract_literal_args`'s post-extraction resume: `i = j + 1`
    # (line 657) advances the outer scan past the literal's closing
    # quote. Mutating `+` to `-` gives `i = j - 1` (resumes one byte
    # BEFORE the closer); mutating to `*` gives `i = j * 1 = j`
    # (resumes AT the closer). Both are equivalent given the actual
    # call sites (`fn_call` is always the literal "env.read" or
    # "fs.read", never attacker-controlled): the closer byte and the
    # literal's own content can never themselves start a valid
    # `is_ident_byte`-bounded match for either needle (a quote
    # character isn't 'e' or 'f', and even if the literal's last
    # content byte were 'f'/'e', the preceding `before_ok` check
    # would still need the FULL needle to follow, which the
    # surrounding quote/paren syntax rules out). Both mutants just
    # cause 1-3 wasted outer-loop iterations (each failing the
    # needle-match, falling through to the unmutated `i += 1` at the
    # bottom of the loop) before reconverging on the exact same
    # position the original code reaches directly. Output is
    # byte-identical for every input this function is ever called
    # with.
    "verifier\\.rs:657:.*replace \\+ with [-*] in taint_flow::extract_literal_args",

    # `extract_literal_args`'s string-body escape check (line 647):
    # `if bytes[j] == b'\\' && j + 1 < bytes.len() { j += 2 } else
    # { j += 1 }`. The bounds check guards against `j += 2` reading
    # past the end when the literal contains an escaped backslash as
    # its very last byte with nothing following (an unterminated,
    # malformed literal — `source` here is the untrusted script, so
    # this genuinely can happen, unlike the `fn_call`-based exclusion
    # above). Five mutations at this position are equivalent for
    # EVERY input, not just realistic ones:
    #   - 647:63 `< → ==`, `< → >`, `< → <=`: only change behaviour
    #     when `j` is the last valid index (elsewhere `j + 1 <
    #     bytes.len()` and the mutant condition agree, since both are
    #     just "is there a next byte"). At that boundary, if
    #     `bytes[j] == b'\\'`: the mutants for `==`/`<=` wrongly take
    #     the escape branch (`j += 2`, landing at `bytes.len() + 1`);
    #     `>` correctly falls to `j += 1` same as the original.
    #   - 647:59 `+ → -` (`j - 1 < bytes.len()`) and `+ → *` (`j * 1 <
    #     bytes.len()` = `j < bytes.len()`): both are trivially true
    #     for every `j` inside the loop (guarded by the loop's own `j
    #     < bytes.len()`), so both always take the escape branch when
    #     `bytes[j] == b'\\'`, including at the last-index boundary.
    # In every one of these boundary-divergent cases, the "wrong"
    # escape branch advances `j` to `bytes.len() + 1` — one past what
    # the correct code reaches (`bytes.len()`) — but the very next
    # thing either code does is re-check `j < bytes.len()` (the outer
    # while, or the closer check at line 653): both `bytes.len()` and
    # `bytes.len() + 1` fail that check identically, and NEITHER value
    # is ever used to index `bytes` (the check happens before any
    # indexing). Both paths therefore reach the same outcome — no
    # literal pushed, no panic — for every possible input, adversarial
    # or not.
    "verifier\\.rs:647:63:.*replace < with (==|>|<=) in taint_flow::extract_literal_args",
    "verifier\\.rs:647:59:.*replace \\+ with [-*] in taint_flow::extract_literal_args",

    # b64_encode combines bytes via bitwise OR after shifting them
    # to non-overlapping positions (0-7, 8-15, 16-23). For non-
    # overlapping bit ranges, `|` and `^` produce identical results.
    # No security difference; mutation passes any test that exercises
    # b64 encoding correctness.
    "taint\\.rs:.*replace \\| with \\^ in b64_encode",

    # ROT-N math coincidence. Inside the alphabetic branch, the
    # original `b - 'A' + n` and the mutant `b + 'A' + n` are
    # equivalent modulo 26 because 'A' = 65 ≡ 13 (mod 26), and the
    # subtraction and addition of any value congruent-to-13 collapse
    # to the same result under `% 26`. The same coincidence applies
    # to 'a' = 97 ≡ 19 (mod 26) — `(b - 'a' + n) % 26 == (b + 'a' + n) % 26`
    # holds. See the docstring on `compute_transforms`.
    "taint\\.rs:25[78]:.*replace - with \\+ in compute_transforms",
    "taint\\.rs:25[78]:.*replace - with / in compute_transforms",

    # `looks_like_path_arg` chained `||` (lines 1956-1958): the
    # path-prefix detection chain is
    #   arg.starts_with('/')
    #     || arg.starts_with("./")
    #     || arg.starts_with("../")
    #     || arg.starts_with("~/")
    #     || arg == "~"
    # Mutating any `||` between two `starts_with` calls to `&&`
    # short-circuits that chain to false (a string can't start with
    # two different prefixes simultaneously). The function then
    # falls through to `if arg.contains('/') { return true; }`,
    # which catches the same paths (anything with `/` returns true
    # there). The only case that's NOT caught by the contains('/')
    # fallthrough is `arg == "~"` — and that case is killed by
    # `looks_like_path_arg_treats_three_elements_with_path` in
    # gate_decisions.rs (which targets the `||` between "~/" and
    # "~"). The other three `||` mutations are observably
    # equivalent.
    "lib\\.rs:195[678]:.*replace \\|\\| with && in looks_like_path_arg",

    # `redact_lines` line-spans assignment: `if m >= *start && m
    # < *end`. The `< with <=` mutant changes whether a match
    # landing EXACTLY at *end (the joining '\n' byte position) is
    # assigned to the previous line. This is unreachable in
    # practice because:
    #   1. For a match to land at *end, the secret must contain a
    #      '\n' (since haystack[*end] == '\n' and subsequence_match
    #      requires needle[i] == haystack[matches[i]]).
    #   2. TaintRegistry::add() trims leading/trailing whitespace
    #      from secrets, so any '\n' must be in the secret's
    #      middle.
    #   3. For a middle '\n' to align with a haystack line
    #      boundary, the secret chars before/after the '\n' must
    #      align with haystack chars before/after that boundary.
    #   4. By construction, every haystack char before the boundary
    #      that's matched by the secret falls into the previous
    #      line's span — meaning the line is already clobbered by
    #      those matches alone, regardless of what happens at the
    #      boundary itself.
    # The mutant therefore changes WHICH match (also) clobbers an
    # already-clobbered line. Output is byte-identical.
    "taint\\.rs:508:.*replace < with <= in redact_lines",

    # `strip_strings_and_comments` escape-bounds check at line 747:
    # `if bytes[i] == b'\\' && i + 1 < bytes.len() { i += 2 } else
    # { i += 1 }`. The bounds check is a guard against `i += 2`
    # walking off the end of the buffer when bytes[i]='\\' is the
    # LAST byte. Three mutations at this position are observably
    # equivalent:
    #
    #   - 747:47 `+ → -`: `i - 1 < len`. For all i >= 1 (we're
    #     past the opener), `i - 1` is in-range and `i - 1 < len`
    #     is always true.
    #   - 747:47 `+ → *`: `i * 1 < len` = `i < len`, also always
    #     true inside this loop (the outer while gates on i < len).
    #   - 747:51 `< → <=`: `i + 1 <= len`, true when i + 1 == len.
    #
    # In all three cases the mutant takes the escape branch (i += 2)
    # WHERE THE ORIGINAL took the else branch (i += 1) — but ONLY
    # at the very last byte of the buffer, where the WHILE loop is
    # about to exit anyway. Specifically the divergence is:
    #
    #   bytes[i] == '\\', i == len - 1
    #   → original: i = len. Mutant: i = len + 1 (or larger).
    #
    # Both i values make the post-loop check `i < len && bytes[i]
    # == q` false (the first conjunct fails), so neither path
    # consumes a closer byte. Both then `out.push(b' ')`. The outer
    # while at the top gates on `i < len` — both i values fail that
    # condition. Output is byte-identical.
    "verifier\\.rs:747:.*replace \\+ with [-*] in strip_strings_and_comments",
    "verifier\\.rs:747:.*replace < with <= in strip_strings_and_comments",

    # *::as_str helpers (SandboxMode::as_str, FsAction::as_str,
    # HttpVerb::as_str) only feed into error-message rendering. The
    # mutator generates `""` and `"xyzzy"` variants that survive
    # because no test asserts the exact string used in a denial
    # message — and asserting on those strings would be brittle
    # (any rephrasing of the error message would break tests). The
    # cosmetic effect of returning the wrong as_str value is "the
    # error message names the wrong action," not a security
    # regression.
    #
    # Format note: this is an FnValue mutator (not BinaryOp), so
    # the mutant name has function-then-return-then-value order:
    # `replace <fn>::as_str -> &'static str with "<value>"`.
    "lib\\.rs:.*::as_str -> &'static str with \"",
]
