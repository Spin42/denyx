name: Mutation testing

on:
  # Run weekly. Mutation testing is too slow to gate every PR; it's
  # a periodic audit signal, not a merge prerequisite.
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC
  # Allow manual triggers from the Actions tab — useful right after
  # a security-critical change to want immediate feedback rather
  # than waiting for the weekly cycle.
  workflow_dispatch:

permissions:
  contents: read
  # Surviving mutants are reported as a CI artefact + (optionally)
  # an issue comment. We don't need write to repo.
  issues: write

concurrency:
  # Only one mutation run at a time. A second trigger while one's in
  # flight (e.g. weekly cron arriving during a manual run) cancels
  # the older to keep the runner queue tidy.
  group: ${{ github.workflow }}
  cancel-in-progress: true

# ─── Why this workflow is sharded ───────────────────────────────────
# .cargo/mutants.toml currently scopes to ~604 mutants across the
# three security-critical files (was ~450 as of the original 4-way
# design below; verifier.rs alone grew from ~112 to 234 mutants from
# the T6 static taint-propagation pass, and per-mutant build time
# also grew from the same crate gaining starlark_syntax + landlock as
# direct deps). At ~50-150s per mutant, a single runner would need
# many hours wall-clock — well past the point where GitHub-hosted
# ubuntu-latest runners reliably stay alive (we observed reaping at
# the ~35min mark with `The runner has received a shutdown signal`,
# and separately a live run where 3 of 4 shards blew the 75min
# per-shard timeout at the old ~110-mutants-per-shard split).
#
# Splitting into 8 parallel shards (≈75 mutants each) keeps every
# runner's lifetime well inside the reliable-completion window even
# at the current, heavier per-mutant cost. The combine job aggregates
# the per-shard reports into one summary so the badge /
# GITHUB_STEP_SUMMARY remain a single coherent view of "how is the
# security core doing". Re-check this math (`cargo mutants --list |
# wc -l`) whenever the three scoped files grow significantly — see
# CLAUDE.md's "Maintenance duties".
# ────────────────────────────────────────────────────────────────────

jobs:
  mutants:
    name: cargo-mutants shard ${{ matrix.shard }}/8
    runs-on: ubuntu-latest
    # Per-shard timeout. ~75 mutants at up to ~150s each with --jobs 2
    # leaves comfortable margin under 90 min even at the slower end of
    # observed per-mutant cost. Set well above the expected finish
    # time but well below the runner-reaping threshold so a genuinely
    # stuck shard fails its own matrix instance without taking down
    # the others.
    timeout-minutes: 90
    strategy:
      # If one shard fails (e.g. a single hard-timeout mutant or a
      # transient runner issue), the other seven should still report
      # their results so the combined view is still useful.
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4

      # bubblewrap for the sandbox tests — same as the regular CI
      # job. cargo-mutants runs the full test suite per mutant, so
      # any test that needs bwrap needs it here too.
      - name: Install bubblewrap
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bubblewrap

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          # All shards share the same dependency-build cache. Each
          # mutant rebuilds the *changed crate* against pre-built
          # deps, so a hot dep cache cuts per-mutant build time
          # dramatically. Distinct cache keys per shard would force
          # 4× the cache work for no benefit.
          shared-key: mutants-deps

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      # denyx-runtime-starlark/build.rs requires the .wasm artefact at
      # compile time (same requirement as ci.yml's build/test/clippy
      # jobs — see scripts/build-runtime-starlark.sh). Missing this
      # step made every scheduled run since 2026-05-18 fail at the
      # baseline check below with "starlark_interpreter.wasm is
      # missing", before mutation testing ever started.
      - name: Stage starlark_interpreter.wasm
        run: bash scripts/build-runtime-starlark.sh

      # Sanity check: the unmodified tree must pass tests before we
      # run the baseline. Any failure here would otherwise look like
      # a "killed mutant" for every mutant — a confusing false signal.
      - name: cargo test (baseline)
        run: cargo test --workspace --locked --no-fail-fast

      - name: Run mutation tests (shard ${{ matrix.shard }}/8)
        # `--jobs 2` (vs the previous `--jobs 4`): cargo-mutants
        # spawns N parallel cargo invocations, each of which itself
        # runs cargo with the runner's NCPUS jobserver. -j 4 on a
        # 4-vCPU runner produced disk + memory contention; -j 2
        # gives each parallel mutant breathing room and finishes
        # faster overall on a constrained runner.
        #
        # `--shard ${{ matrix.shard }}/8` partitions the full
        # mutant set deterministically — combined with
        # `--no-shuffle` from .cargo/mutants.toml, shard k always
        # contains the same mutants across runs.
        #
        # `|| echo "..."` swallows the non-zero exit code that
        # cargo-mutants returns when *any* mutant survives. A
        # surviving mutant is interesting-but-expected output, not
        # a workflow failure. Combined with `continue-on-error:
        # true` below, this keeps the badge green when the only
        # "failure" is "tests didn't catch every mutation."
        run: |
          cargo mutants --workspace --no-shuffle --jobs 2 \
            --shard ${{ matrix.shard }}/8 \
            --output mutants-output \
            || echo "mutants-exit-code=$?" >> "$GITHUB_OUTPUT"
        id: mutants
        continue-on-error: true

      # Always upload the report so triage can happen even when the
      # job's exit code is non-zero (which it will be whenever any
      # mutant survives — that's expected output, not a workflow
      # failure).
      - name: Upload shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-shard-${{ matrix.shard }}
          path: mutants-output/
          retention-days: 30

  combine:
    name: Aggregate shard reports
    needs: mutants
    # Run even if some shards failed — partial data is still useful.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: mutants-shard-*
          path: shards/

      - name: Combine and summarise
        run: |
          # Aggregate the per-status text files across all shards.
          # cargo-mutants writes one line per mutant in each of:
          #   - missed.txt   — surviving mutants (test gap)
          #   - timeout.txt  — mutants that hung (likely infinite loop)
          #   - unviable.txt — mutants that failed to compile
          #   - caught.txt   — mutants killed by tests
          mkdir -p combined
          for f in missed timeout unviable caught; do
            : > "combined/${f}.txt"
            for shard_dir in shards/mutants-shard-*; do
              if [ -f "${shard_dir}/${f}.txt" ]; then
                cat "${shard_dir}/${f}.txt" >> "combined/${f}.txt"
              fi
            done
          done

          {
            echo "## Mutation testing summary (8-way sharded)"
            echo ""

            shards_present=$(find shards -maxdepth 1 -type d -name 'mutants-shard-*' | wc -l)
            echo "Shards reporting: ${shards_present}/8"
            echo ""

            if [ -s combined/missed.txt ]; then
              n=$(wc -l < combined/missed.txt)
              echo "**${n} surviving mutant(s)** — tests did not catch these mutations."
              echo ""
              echo "<details><summary>Show surviving mutants</summary>"
              echo ""
              echo '```'
              cat combined/missed.txt
              echo '```'
              echo "</details>"
            else
              if [ "${shards_present}" -eq 8 ]; then
                echo "✅ No surviving mutants across all 8 shards."
              else
                echo "⚠ No surviving mutants in the **${shards_present}** shards that reported, but **$((8 - shards_present))** shard(s) did not produce a report. Re-run to confirm full coverage."
              fi
            fi

            if [ -s combined/timeout.txt ]; then
              t=$(wc -l < combined/timeout.txt)
              echo ""
              echo "${t} mutant(s) timed out (likely an infinite-loop mutation)."
            fi
            if [ -s combined/unviable.txt ]; then
              u=$(wc -l < combined/unviable.txt)
              echo ""
              echo "${u} mutant(s) failed to compile (uninteresting; type-system or borrow-check rejected)."
            fi
            if [ -s combined/caught.txt ]; then
              c=$(wc -l < combined/caught.txt)
              echo ""
              echo "${c} mutant(s) caught by tests."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: combined/
          retention-days: 30
